name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - '5.38'
          - '5.40'
          - '5.42'
    
    name: Perl ${{ matrix.perl-version }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies and run tests (SQLite only)
        run: |
          docker run --rm \
            -v $PWD:/app -w /app \
            perl:${{ matrix.perl-version }} bash -c "
              cpanm --notest Module::Install &&
              cpanm --notest --installdeps . &&
              perl Makefile.PL &&
              make test
            "
